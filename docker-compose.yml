services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cloudmesh
      POSTGRES_PASSWORD: cloudmesh
      POSTGRES_DB: cloudmesh
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
